<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 128" role="img" aria-label="Ship of Tools">
  <title>Ship of Tools</title>
  <!-- helm icon (canonical Julia orientation: green top, red BL, purple BR) -->
