# git-cliff config — conventional-commit changelog/release notes (ADR 0030 §3).
# Used by the release workflow (orhun/git-cliff-action) and, when installed
# locally, by scripts/release.sh to regenerate CHANGELOG.md.

[changelog]
header = """
# Changelog

All notable changes to Ship of Tools. Generated from conventional commits by git-cliff.
"""
body = """
{% if version %}## {{ version }} — {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}- {{ commit.message | upper_first }}{% if commit.scope %} ({{ commit.scope }}){% endif %}
{% endfor %}{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
# Group names carry an invisible HTML-comment sort key — git-cliff orders
# groups alphabetically, and without the key "Chores" led the notes.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Refactoring" },
    { message = "^docs\\(adr\\)", group = "<!-- 4 -->Design (ADRs)" },
    { message = "^docs", group = "<!-- 5 -->Documentation" },
    { message = "^test", group = "<!-- 6 -->Tests" },
    { message = "^release", skip = true },
    { message = "^bus:", skip = true },
    { message = "^chore", group = "<!-- 7 -->Chores" },
    { message = ".*", group = "<!-- 8 -->Other" },
]
